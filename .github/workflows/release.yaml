name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26.4"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  OWNER: samyn92
  PACKAGE_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: tag
        name: Validate release tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must look like v1.2.3 or v1.2.3-rc.1; got $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Check GHCR login
        run: echo "${PACKAGE_TOKEN}" | docker login "${REGISTRY}" -u "${GITHUB_ACTOR}" --password-stdin
      - name: Check release metadata
        run: |
          set -euo pipefail
          grep -q "release: ${GITHUB_REF_NAME}" deploy/charts/versions.yaml
          grep -q "version: ${GITHUB_REF_NAME#v}" deploy/charts/agentops/Chart.yaml

  validate-go:
    name: Validate Go
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go vet ./...
      - run: go test ./...
      - name: Build release binaries
        run: |
          go build ./cmd/operator/
          go build ./cmd/console/
          go build ./cmd/runtime/
          go build ./cmd/memory/
          go build ./cmd/tools-cli/
          go build ./tools/...
          go build ./channels/...

  validate-web:
    name: Validate Web
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npx vite build
        working-directory: web

  validate-docs:
    name: Validate Docs
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true
      - run: npm ci
        working-directory: docs
      - run: hugo --minify
        working-directory: docs

  validate-chart:
    name: Validate Chart
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Inspect vendored dependencies
        run: helm dependency list deploy/charts/agentops
      - run: helm lint deploy/charts/agentops
      - run: helm template agentops deploy/charts/agentops --namespace agent-system >/tmp/agentops-rendered.yaml
      - run: helm package deploy/charts/agentops --destination /tmp

  validate-docker:
    name: Validate Docker Builds
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: operator
            dockerfile: Dockerfile.operator
          - name: console
            dockerfile: Dockerfile.console
          - name: runtime
            dockerfile: Dockerfile.runtime
          - name: memory
            dockerfile: Dockerfile.memory
          - name: channel-webhook
            dockerfile: channels/webhook/Dockerfile
          - name: channel-gitlab
            dockerfile: channels/gitlab/Dockerfile
          - name: channel-gitlab-label
            dockerfile: channels/gitlab-label/Dockerfile
          - name: channel-gitlab-comment
            dockerfile: channels/gitlab-comment/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: agentops-release/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  publish-images:
    name: Publish Images
    needs: [validate-go, validate-web, validate-docs, validate-chart, validate-docker]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: operator
            dockerfile: Dockerfile.operator
            image: ghcr.io/samyn92/agentops/operator
          - name: console
            dockerfile: Dockerfile.console
            image: ghcr.io/samyn92/agentops/console
          - name: runtime
            dockerfile: Dockerfile.runtime
            image: ghcr.io/samyn92/agentops/runtime
          - name: memory
            dockerfile: Dockerfile.memory
            image: ghcr.io/samyn92/agentops/memory
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ env.PACKAGE_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ github.ref_name }}
            ${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  publish-channels:
    name: Publish Channels
    needs: [validate-go, validate-docs, validate-chart, validate-docker]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: webhook
            dockerfile: channels/webhook/Dockerfile
            image: ghcr.io/samyn92/agentops/channels/webhook
          - name: gitlab
            dockerfile: channels/gitlab/Dockerfile
            image: ghcr.io/samyn92/agentops/channels/gitlab
          - name: gitlab-label
            dockerfile: channels/gitlab-label/Dockerfile
            image: ghcr.io/samyn92/agentops/channels/gitlab-label
          - name: gitlab-comment
            dockerfile: channels/gitlab-comment/Dockerfile
            image: ghcr.io/samyn92/agentops/channels/gitlab-comment
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ env.PACKAGE_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ github.ref_name }}
            ${{ matrix.image }}:latest
          cache-from: type=gha,scope=channel-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=channel-${{ matrix.name }}

  publish-tools:
    name: Publish Tools
    needs: [validate-go, validate-docs, validate-chart]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        tool: [kubectl, flux, git, github, helm, tempo, kube-explore]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build tool packager and server
        run: |
          set -euo pipefail
          go build -o /tmp/agent-tools ./cmd/tools-cli/
          mkdir -p tools/${{ matrix.tool }}/dist/bin
          CGO_ENABLED=0 go build -o tools/${{ matrix.tool }}/dist/bin/mcp-${{ matrix.tool }} ./tools/${{ matrix.tool }}/
          cp tools/${{ matrix.tool }}/manifest.json tools/${{ matrix.tool }}/dist/
      - name: Bundle required CLI binaries
        run: |
          set -euo pipefail
          TOOL="${{ matrix.tool }}"
          DIST="tools/${TOOL}/dist/bin"
          case "$TOOL" in
            kubectl)
              curl -sLo "${DIST}/kubectl" "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              chmod +x "${DIST}/kubectl"
              ;;
            flux)
              FLUX_VERSION=$(curl -s https://api.github.com/repos/fluxcd/flux2/releases/latest | jq -r .tag_name)
              curl -sLo /tmp/flux.tar.gz "https://github.com/fluxcd/flux2/releases/download/${FLUX_VERSION}/flux_${FLUX_VERSION#v}_linux_amd64.tar.gz"
              tar -xzf /tmp/flux.tar.gz -C "${DIST}" flux
              ;;
            helm)
              curl -sL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | HELM_INSTALL_DIR="${DIST}" USE_SUDO=false bash
              ;;
            git)
              # git is expected to be available in the runtime base image (alpine/debian)
              # The tool checks /usr/bin/git first, then PATH
              ;;
          esac
      - name: Login to GHCR
        run: echo "${PACKAGE_TOKEN}" | docker login "${REGISTRY}" -u "${GITHUB_ACTOR}" --password-stdin
      - name: Push OCI artifact
        run: |
          set -euo pipefail
          /tmp/agent-tools push tools/${{ matrix.tool }}/dist/ \
            -t ghcr.io/samyn92/agentops/tools/${{ matrix.tool }}:${{ github.ref_name }}
          /tmp/agent-tools push tools/${{ matrix.tool }}/dist/ \
            -t ghcr.io/samyn92/agentops/tools/${{ matrix.tool }}:latest

  publish-chart:
    name: Publish Chart
    needs: [publish-images, publish-channels, publish-tools]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Login to GHCR
        run: echo "${PACKAGE_TOKEN}" | helm registry login "${REGISTRY}" -u "${GITHUB_ACTOR}" --password-stdin
      - name: Package and push chart
        run: |
          set -euo pipefail
          helm package deploy/charts/agentops
          helm push agentops-*.tgz oci://ghcr.io/samyn92/agentops/charts

  github-release:
    name: GitHub Release
    needs: [publish-chart]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
