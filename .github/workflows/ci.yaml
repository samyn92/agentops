name: CI

on:
  push:
    branches: [main, monorepo]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.4"
  NODE_VERSION: "22"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
      charts: ${{ steps.filter.outputs.charts }}
      docker: ${{ steps.filter.outputs.docker }}
      release: ${{ steps.filter.outputs.release }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - "**/*.go"
              - "go.mod"
              - "go.sum"
            web:
              - "web/**"
            docs:
              - "docs/**"
            charts:
              - "deploy/charts/**"
            docker:
              - "Dockerfile.*"
              - "channels/**/Dockerfile"
              - ".dockerignore"
            release:
              - ".github/workflows/**"
              - "deploy/charts/versions.yaml"

  go:
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build binaries
        run: |
          go build ./cmd/operator/
          go build ./cmd/console/
          go build ./cmd/runtime/
          go build ./cmd/memory/
          go build ./cmd/tools-cli/
          go build ./tools/...
          go build ./channels/...

  web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - name: Build frontend exactly like the release image
        run: npx vite build
        working-directory: web

  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true
      - run: npm ci
        working-directory: docs
      - run: hugo --minify
        working-directory: docs

  charts:
    needs: changes
    if: needs.changes.outputs.charts == 'true' || needs.changes.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Inspect vendored dependencies
        run: helm dependency list deploy/charts/agentops
      - name: Lint chart
        run: helm lint deploy/charts/agentops
      - name: Render chart
        run: helm template agentops deploy/charts/agentops --namespace agent-system >/tmp/agentops-rendered.yaml
      - name: Package chart
        run: helm package deploy/charts/agentops --destination /tmp

  docker:
    needs: changes
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.go == 'true' || needs.changes.outputs.release == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: operator
            dockerfile: Dockerfile.operator
          - name: console
            dockerfile: Dockerfile.console
          - name: runtime
            dockerfile: Dockerfile.runtime
          - name: memory
            dockerfile: Dockerfile.memory
          - name: channel-webhook
            dockerfile: channels/webhook/Dockerfile
          - name: channel-gitlab
            dockerfile: channels/gitlab/Dockerfile
          - name: channel-gitlab-label
            dockerfile: channels/gitlab-label/Dockerfile
          - name: channel-gitlab-comment
            dockerfile: channels/gitlab-comment/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: agentops-ci/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
