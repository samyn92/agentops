apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # RBAC (cluster roles + bindings for agent SAs)
  - rbac.yaml
  # Providers
  - provider-anthropic.yaml
  - provider-kimi.yaml
  # Homecluster (standalone workspace — not factory-managed)
  - integration-homecluster-repo.yaml
  - agent-homecluster-manager.yaml
  # Factory-managed agents are deployed via Helm:
  #   helm install samyn92-lab deploy/charts/agent-factory -n agents \
  #     --set scope.gitlab.group=samyn92-lab \
  #     --set runtime.image=ghcr.io/samyn92/agentops/runtime:dev \
  #     --set channels.labelBridge.image=ghcr.io/samyn92/agentops/channels/gitlab-label:dev
