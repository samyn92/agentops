apiVersion: agents.agentops.io/v1alpha1
kind: Integration
metadata:
  name: agent-tools-repo
  namespace: agents
spec:
  kind: github-repo
  displayName: Agent Tools
  description: "MCP tool servers (kubectl, kube-explore, flux, git, github, gitlab, tempo) and OCI CLI"
  credentials:
    name: github-token
    key: GITHUB_TOKEN
  github:
    owner: samyn92
    repo: agent-tools
    defaultBranch: main
