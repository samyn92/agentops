# Dev environment for local k3s cluster.
# Apply everything:  kubectl apply -k deploy/local-k3s/deploy/
# Apply one component: kubectl apply -f deploy/local-k3s/deploy/operator-dev.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - agentops-memory.yaml
  - operator-dev.yaml
  - console-dev.yaml
