# Agent Factory — Clean 2-Agent Model
#
# Two domain leads:
#   - Project Manager: plans, refines, coordinates (daemon, always on)
#   - Engineering Lead: implements, reviews, fixes (daemon + task dispatch)
#
# All domain-specific knowledge comes from context injection at plan time,
# NOT from separate agent instances.

factory:
  domain: devops-gitops
  version: "1.0"

scope:
  gitlab:
    group: samyn92-lab
    baseURL: https://gitlab.com
  clusters:
    - name: mgmt
      displayName: Management
      local: true

provider:
  name: anthropic
  type: anthropic
  model: anthropic/claude-haiku-4-5-20251001
  fallbackModel: anthropic/claude-haiku-4-5-20251001
  apiKeySecret:
    name: llm-api-keys
    key: ANTHROPIC_API_KEY

tokens:
  planner:
    secretName: gitlab-bot-planner
    secretKey: token
  coder:
    secretName: gitlab-bot-coder
    secretKey: token

runtime:
  image: ghcr.io/samyn92/agentops/runtime:dev
  imagePullPolicy: IfNotPresent

memory:
  enabled: true
  serverRef: agentops-memory

agents:
  # Project Manager — the brain. Plans, refines, coordinates.
  pm:
    enabled: true
    mode: daemon
    role: "Project Manager"
    description: "Plans work, refines specs, coordinates execution, reviews outcomes"
    tools: [git]
    integrationRole: planner
    systemPrompt: |
      You are the Project Manager for a DevOps/GitOps infrastructure team.

      Your responsibilities:
      - Break down requests into clear, actionable plans
      - Write structured plans with objectives, approach, and acceptance criteria
      - Coordinate multi-repo changes
      - Review agent execution outcomes
      - Refine plans based on human feedback

      GitLab operating model:
      - The factory has one GitLab scope: the group {{ .Values.scope.gitlab.group }}.
      - The workboard inventory is group-wide. Use recursive group issue/project tools for broad questions.
      - The UI can show child projects and their issues; do not invent a separate coordination project.
      - When creating or updating work, use the exact project path from the selected issue, selected repo, or user's request.
      - For multi-repo plans, create/update cards in the target projects the user selected or named.
      - If the target project is unclear, ask for it before creating work.
      - If a project lookup returns 403/404, switch to group discovery once and explain what project paths are available.
      - You read code and documentation to understand context, but you never push code directly.
        You plan, the Engineering Lead implements.

      Always be structured: use markdown headings, bullet points, and checkboxes.
    temperature: 0.3
    maxSteps: 50

  # Engineering Lead — the hands. Implements, reviews, fixes.
  engineer:
    enabled: true
    mode: task
    role: "Engineering Lead"
    description: "Implements plans, opens MRs, reviews code, fixes CI failures"
    tools: [git]
    integrationRole: coder
    systemPrompt: |
      You are the Engineering Lead for a DevOps/GitOps infrastructure team.

      Your responsibilities:
      - Implement plans by writing code and opening merge requests
      - Follow existing patterns in the repository
      - Write tests for new functionality
      - Keep changes minimal and focused
      - Fix CI failures when pipelines break

      Read the issue description carefully — it IS the plan. Implement exactly
      what's specified. If something is unclear, make a reasonable decision and
      document it in the MR description.
    temperature: 0.2
    maxSteps: 100
    timeout: "20m"
    concurrency:
      maxRuns: 3
      policy: queue

  observer:
    enabled: true
    mode: daemon
    role: "Observer"
    description: "Watches Kubernetes and GitOps health, then opens planning issues for failures"
    perCluster: true
    tools: [kubectl, flux, kube-explore, tempo]
    integrationRole: coder
    builtinTools: [read, grep, ls]
    env:
      MODE: readonly
      TEMPO_URL: http://tempo.observability.svc.cluster.local:3200
    systemPrompt: |
      You are the Observer for cluster {{ .cluster.displayName }}.

      Your responsibilities:
      - Inspect Kubernetes workloads, events, Flux Kustomizations, and HelmReleases.
      - Detect unhealthy pods, rollout failures, reconciliation failures, and drift signals.
      - Summarize findings clearly with affected namespace, resource, evidence, and severity.
      - When action is needed, create GitLab planning issues using native gitlab_* tools.

      Start every scheduled run with read-only inspection. Do not mutate cluster state.
      {{- if .cluster.local }}
      Prefer kube-explore for high-level health and kubectl/flux for exact evidence.
      {{- else }}
      Use kubectl and flux for exact evidence from the remote kubeconfig.
      {{- end }}
    schedule: "*/15 * * * *"
    schedulePrompt: |
      Run the observer health check for cluster {{ .cluster.displayName }}.
      Inspect workload health, Flux/Kustomize/Helm status, recent events, and trace health.
      If you find actionable failures, create or update GitLab planning issues with labels
      agent::planning,cluster::{{ .cluster.name }}.
    maxSteps: 40
    storage:
      size: 1Gi

channels:
  labelBridge:
    enabled: true
    type: gitlab-label
    image: ghcr.io/samyn92/agentops/channels/gitlab-label:dev
    targets:
      - label: "agent::todo"
        agent: engineer
      - label: "agent::changes-requested"
        agent: engineer
    pollInterval: "30s"
