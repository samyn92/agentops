{{- $fullname := include "factory.fullname" . }}
{{- $root := . }}

{{- range $key, $channel := .Values.channels }}
{{- if $channel.enabled }}
---
apiVersion: agents.agentops.io/v1alpha1
kind: Channel
metadata:
  name: {{ $fullname }}-{{ $key | kebabcase }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "factory.labels" $root | nindent 4 }}
spec:
  type: {{ $channel.type }}
  agentRef: {{ $fullname }}-{{ $channel.agent | kebabcase }}
  image: {{ $channel.image }}
  {{- if $channel.imagePullPolicy }}
  imagePullPolicy: {{ $channel.imagePullPolicy }}
  {{- end }}
  gitlabLabel:
    integrationRef: {{ $fullname }}-{{ $channel.integrationRole | default "planner" }}
    target: issues
    labels:
      {{- range $channel.labels }}
      - {{ . }}
      {{- end }}
    state: opened
    {{- if $channel.pollInterval }}
    pollInterval: {{ $channel.pollInterval }}
    {{- end }}
  prompt: |
    Work on GitLab issue #{{`{{ .item.IID }}`}} "{{`{{ .item.Title }}`}}" in project {{`{{ .gitlab.project }}`}}.

    Complete the work described, push your changes, and open a merge request.
    Read the full issue description from GitLab for detailed requirements.
{{- end }}
{{- end }}
