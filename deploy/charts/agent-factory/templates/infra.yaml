{{- $fullname := include "factory.fullname" . }}
---
apiVersion: agents.agentops.io/v1alpha1
kind: Provider
metadata:
  name: {{ .Values.provider.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "factory.labels" . | nindent 4 }}
spec:
  type: {{ .Values.provider.type }}
  apiKeySecret:
    name: {{ .Values.provider.apiKeySecret.name }}
    key: {{ .Values.provider.apiKeySecret.key }}
---
apiVersion: agents.agentops.io/v1alpha1
kind: Integration
metadata:
  name: {{ $fullname }}-planner
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "factory.labels" . | nindent 4 }}
spec:
  kind: gitlab-group
  displayName: "{{ .Values.scope.gitlab.group }} (planner)"
  gitlabGroup:
    baseURL: {{ .Values.scope.gitlab.baseURL }}
    group: {{ .Values.scope.gitlab.group }}
  credentials:
    name: {{ .Values.tokens.planner.secretName }}
    key: {{ .Values.tokens.planner.secretKey }}
---
apiVersion: agents.agentops.io/v1alpha1
kind: Integration
metadata:
  name: {{ $fullname }}-coder
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "factory.labels" . | nindent 4 }}
spec:
  kind: gitlab-group
  displayName: "{{ .Values.scope.gitlab.group }} (coder)"
  gitlabGroup:
    baseURL: {{ .Values.scope.gitlab.baseURL }}
    group: {{ .Values.scope.gitlab.group }}
  credentials:
    name: {{ .Values.tokens.coder.secretName }}
    key: {{ .Values.tokens.coder.secretKey }}
