{{- $fullname := include "factory.fullname" . }}
{{- $provider := .Values.provider.name }}
{{- $runtime := .Values.runtime.image }}
{{- $model := .Values.provider.model }}
{{- $fallback := .Values.provider.fallbackModel }}
{{- $memory := .Values.memory }}
{{- $root := . }}

{{- range $key, $agent := .Values.agents }}
{{- if $agent.enabled }}
---
apiVersion: agents.agentops.io/v1alpha1
kind: Agent
metadata:
  name: {{ $fullname }}-{{ $key | kebabcase }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "factory.labels" $root | nindent 4 }}
    agentops.dev/role: {{ $agent.role | default $key | kebabcase | quote }}
  annotations:
    agentops.dev/description: {{ $agent.description | default "" | quote }}
spec:
  mode: {{ $agent.mode }}
  model: {{ $model }}
  image: {{ $runtime }}
  systemPrompt: {{ $agent.systemPrompt | quote }}
  {{- if $agent.temperature }}
  temperature: {{ $agent.temperature }}
  {{- end }}
  {{- if $agent.maxSteps }}
  maxSteps: {{ $agent.maxSteps }}
  {{- end }}
  {{- if $agent.timeout }}
  timeout: {{ $agent.timeout | quote }}
  {{- end }}
  providerRefs:
    - name: {{ $provider }}
  fallbackModels:
    - {{ $fallback }}
  builtinTools: [bash, read, edit, write, grep, ls, glob, fetch]
  {{- if $agent.tools }}
  tools:
    {{- range $agent.tools }}
    - name: {{ . }}
      oci:
        ref: ghcr.io/samyn92/agent-tools/{{ . }}:latest
    {{- end }}
  {{- end }}
  integrations:
    - name: {{ include "factory.integrationFor" (dict "mode" $agent.mode "root" $root) }}
      {{- if eq $agent.mode "daemon" }}
      readOnly: true
      {{- end }}
  {{- if and $memory $memory.enabled }}
  memory:
    serverRef: {{ $memory.serverRef }}
  {{- end }}
  {{- if $agent.concurrency }}
  concurrency:
    maxRuns: {{ $agent.concurrency.maxRuns }}
    policy: {{ $agent.concurrency.policy }}
  {{- end }}
{{- end }}
{{- end }}
