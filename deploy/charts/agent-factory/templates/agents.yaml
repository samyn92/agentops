{{- $fullname := include "agent-factory.fullname" . }}
{{- $provider := .Values.provider.name }}
{{- $plannerIntg := printf "%s-planner" $fullname }}
{{- $coderIntg := printf "%s-coder" $fullname }}

{{- if .Values.agents.planner.enabled }}
---
apiVersion: agents.agentops.io/v1alpha1
kind: Agent
metadata:
  name: {{ $fullname }}-planner
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-factory.labels" . | nindent 4 }}
spec:
  mode: {{ .Values.agents.planner.mode }}
  model: {{ .Values.provider.model }}
  image: {{ .Values.runtime.image }}
  systemPrompt: {{ .Values.agents.planner.systemPrompt | quote }}
  temperature: {{ .Values.agents.planner.temperature }}
  maxSteps: {{ .Values.agents.planner.maxSteps }}
  providerRefs:
    - name: {{ $provider }}
  fallbackModels:
    - {{ .Values.provider.fallbackModel }}
  builtinTools: [bash, read, edit, write, grep, ls, glob, fetch]
  tools:
    {{- range .Values.agents.planner.tools }}
    - name: {{ . }}
      oci:
        ref: ghcr.io/samyn92/agent-tools/{{ . }}:latest
    {{- end }}
  integrations:
    - name: {{ $plannerIntg }}
  {{- if .Values.memory.enabled }}
  memory:
    serverRef: {{ .Values.memory.serverRef }}
  {{- end }}
  delegation:
    team:
      - {{ $fullname }}-implementer
    maxFanOut: 3
{{- end }}

{{- if .Values.agents.implementer.enabled }}
---
apiVersion: agents.agentops.io/v1alpha1
kind: Agent
metadata:
  name: {{ $fullname }}-implementer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-factory.labels" . | nindent 4 }}
spec:
  mode: {{ .Values.agents.implementer.mode }}
  model: {{ .Values.provider.model }}
  image: {{ .Values.runtime.image }}
  systemPrompt: {{ .Values.agents.implementer.systemPrompt | quote }}
  temperature: {{ .Values.agents.implementer.temperature | default 0.2 }}
  maxSteps: {{ .Values.agents.implementer.maxSteps | default 100 }}
  timeout: {{ .Values.agents.implementer.timeout | default "20m" | quote }}
  providerRefs:
    - name: {{ $provider }}
  fallbackModels:
    - {{ .Values.provider.fallbackModel }}
  builtinTools: [bash, read, edit, write, grep, ls, glob, fetch]
  tools:
    {{- range .Values.agents.implementer.tools }}
    - name: {{ . }}
      oci:
        ref: ghcr.io/samyn92/agent-tools/{{ . }}:latest
    {{- end }}
  integrations:
    - name: {{ $coderIntg }}
  {{- if .Values.memory.enabled }}
  memory:
    serverRef: {{ .Values.memory.serverRef }}
  {{- end }}
  {{- if .Values.agents.implementer.concurrency }}
  concurrency:
    maxRuns: {{ .Values.agents.implementer.concurrency.maxRuns }}
    policy: {{ .Values.agents.implementer.concurrency.policy }}
  {{- end }}
{{- end }}

{{- if .Values.agents.reviewer.enabled }}
---
apiVersion: agents.agentops.io/v1alpha1
kind: Agent
metadata:
  name: {{ $fullname }}-reviewer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-factory.labels" . | nindent 4 }}
spec:
  mode: {{ .Values.agents.reviewer.mode }}
  model: {{ .Values.provider.model }}
  image: {{ .Values.runtime.image }}
  systemPrompt: {{ .Values.agents.reviewer.systemPrompt | quote }}
  temperature: {{ .Values.agents.reviewer.temperature | default 0.3 }}
  maxSteps: {{ .Values.agents.reviewer.maxSteps | default 30 }}
  providerRefs:
    - name: {{ $provider }}
  fallbackModels:
    - {{ .Values.provider.fallbackModel }}
  builtinTools: [bash, read, grep, ls, glob, fetch]
  tools:
    {{- range .Values.agents.reviewer.tools }}
    - name: {{ . }}
      oci:
        ref: ghcr.io/samyn92/agent-tools/{{ . }}:latest
    {{- end }}
  integrations:
    - name: {{ $plannerIntg }}
      readOnly: true
  {{- if .Values.memory.enabled }}
  memory:
    serverRef: {{ .Values.memory.serverRef }}
  {{- end }}
{{- end }}

