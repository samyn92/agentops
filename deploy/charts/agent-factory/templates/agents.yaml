{{- $fullname := include "factory.fullname" . }}
{{- $provider := .Values.provider.name }}
{{- $runtime := .Values.runtime.image }}
{{- $runtimePullPolicy := .Values.runtime.imagePullPolicy }}
{{- $model := .Values.provider.model }}
{{- $fallback := .Values.provider.fallbackModel }}
{{- $memory := .Values.memory }}
{{- $toolRegistry := .Values.runtime.toolRegistry | default "ghcr.io/samyn92/agentops/tools" }}
{{- $toolTag := .Values.runtime.toolTag | default "latest" }}
{{- $root := . }}

{{- range $key, $agent := .Values.agents }}
{{- if $agent.enabled }}
{{- if $agent.perCluster }}
{{- range $cluster := $.Values.scope.clusters }}
{{- $ctx := dict "Values" $.Values "Release" $.Release "Chart" $.Chart "Capabilities" $.Capabilities "cluster" $cluster }}
---
apiVersion: agents.agentops.io/v1alpha1
kind: Agent
metadata:
  name: {{ $fullname }}-{{ $key | kebabcase }}-{{ $cluster.name | kebabcase }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "factory.labels" $root | nindent 4 }}
    agentops.dev/role: {{ $agent.role | default $key | kebabcase | quote }}
    agentops.dev/cluster: {{ $cluster.name | quote }}
  annotations:
    agentops.dev/description: {{ $agent.description | default "" | quote }}
spec:
  mode: {{ $agent.mode }}
  model: {{ $model }}
  image: {{ $runtime }}
  {{- if or $agent.imagePullPolicy $runtimePullPolicy }}
  imagePullPolicy: {{ $agent.imagePullPolicy | default $runtimePullPolicy }}
  {{- end }}
  systemPrompt: {{ tpl $agent.systemPrompt $ctx | quote }}
  {{- if $agent.temperature }}
  temperature: {{ $agent.temperature }}
  {{- end }}
  {{- if $agent.maxSteps }}
  maxSteps: {{ $agent.maxSteps }}
  {{- end }}
  {{- if $agent.timeout }}
  timeout: {{ $agent.timeout | quote }}
  {{- end }}
  providerRefs:
    - name: {{ $provider }}
  fallbackModels:
    - {{ $fallback }}
  builtinTools:
    {{- range ($agent.builtinTools | default (list "bash" "read" "edit" "write" "grep" "ls" "glob" "fetch")) }}
    - {{ . }}
    {{- end }}
  {{- $tools := ($cluster.tools | default $agent.tools) }}
  {{- if $tools }}
  tools:
    {{- range $tools }}
    - name: {{ . }}
      oci:
        ref: {{ $toolRegistry }}/{{ . }}:{{ $toolTag }}
    {{- end }}
  {{- end }}
  integrations:
    - name: {{ include "factory.integrationFor" (dict "mode" $agent.mode "integrationRole" $agent.integrationRole "root" $root) }}
      {{- if hasKey $agent "readOnly" }}
      {{- if $agent.readOnly }}
      readOnly: true
      {{- end }}
      {{- else if and (eq $agent.mode "daemon") (ne ($agent.integrationRole | default "") "coder") }}
      readOnly: true
      {{- end }}
  {{- if $agent.env }}
  env:
    {{- range $name, $value := $agent.env }}
    {{ $name }}: {{ tpl (toString $value) $ctx | quote }}
    {{- end }}
  {{- end }}
  {{- if or $agent.secrets $cluster.kubeconfigSecret }}
  secrets:
    {{- range ($agent.secrets | default list) }}
    - name: {{ .name }}
      secretRef:
        name: {{ tpl .secretRef.name $ctx }}
        key: {{ .secretRef.key }}
    {{- end }}
    {{- if $cluster.kubeconfigSecret }}
    - name: KUBECONFIG_DATA
      secretRef:
        name: {{ $cluster.kubeconfigSecret }}
        key: {{ $cluster.kubeconfigKey | default "kubeconfig" }}
    {{- end }}
  {{- end }}
  {{- if and $memory $memory.enabled }}
  memory:
    serverRef: {{ $memory.serverRef }}
  {{- end }}
  {{- if $agent.security }}
  security:
    {{- toYaml $agent.security | nindent 4 }}
  {{- end }}
  {{- if $agent.schedule }}
  schedule: {{ tpl $agent.schedule $ctx | quote }}
  {{- end }}
  {{- if $agent.schedulePrompt }}
  schedulePrompt: {{ tpl $agent.schedulePrompt $ctx | quote }}
  {{- end }}
  {{- if $agent.storage }}
  storage:
    size: {{ $agent.storage.size | quote }}
    {{- if $agent.storage.storageClass }}
    storageClass: {{ $agent.storage.storageClass | quote }}
    {{- end }}
  {{- end }}
  {{- if $agent.resources }}
  resources:
    {{- toYaml $agent.resources | nindent 4 }}
  {{- end }}
  {{- if $agent.concurrency }}
  concurrency:
    maxRuns: {{ $agent.concurrency.maxRuns }}
    policy: {{ $agent.concurrency.policy }}
  {{- end }}
{{- end }}
{{- else }}
---
apiVersion: agents.agentops.io/v1alpha1
kind: Agent
metadata:
  name: {{ $fullname }}-{{ $key | kebabcase }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "factory.labels" $root | nindent 4 }}
    agentops.dev/role: {{ $agent.role | default $key | kebabcase | quote }}
  annotations:
    agentops.dev/description: {{ $agent.description | default "" | quote }}
spec:
  mode: {{ $agent.mode }}
  model: {{ $model }}
  image: {{ $runtime }}
  {{- if or $agent.imagePullPolicy $runtimePullPolicy }}
  imagePullPolicy: {{ $agent.imagePullPolicy | default $runtimePullPolicy }}
  {{- end }}
  systemPrompt: {{ tpl $agent.systemPrompt $root | quote }}
  {{- if $agent.temperature }}
  temperature: {{ $agent.temperature }}
  {{- end }}
  {{- if $agent.maxSteps }}
  maxSteps: {{ $agent.maxSteps }}
  {{- end }}
  {{- if $agent.timeout }}
  timeout: {{ $agent.timeout | quote }}
  {{- end }}
  providerRefs:
    - name: {{ $provider }}
  fallbackModels:
    - {{ $fallback }}
  builtinTools:
    {{- range ($agent.builtinTools | default (list "bash" "read" "edit" "write" "grep" "ls" "glob" "fetch")) }}
    - {{ . }}
    {{- end }}
  {{- if $agent.tools }}
  tools:
    {{- range $agent.tools }}
    - name: {{ . }}
      oci:
        ref: {{ $toolRegistry }}/{{ . }}:{{ $toolTag }}
    {{- end }}
  {{- end }}
  integrations:
    - name: {{ include "factory.integrationFor" (dict "mode" $agent.mode "integrationRole" $agent.integrationRole "root" $root) }}
      {{- if hasKey $agent "readOnly" }}
      {{- if $agent.readOnly }}
      readOnly: true
      {{- end }}
      {{- else if and (eq $agent.mode "daemon") (ne ($agent.integrationRole | default "") "coder") }}
      readOnly: true
      {{- end }}
  {{- if $agent.env }}
  env:
    {{- range $name, $value := $agent.env }}
    {{ $name }}: {{ tpl (toString $value) $root | quote }}
    {{- end }}
  {{- end }}
  {{- if $agent.secrets }}
  secrets:
    {{- range $agent.secrets }}
    - name: {{ .name }}
      secretRef:
        name: {{ tpl .secretRef.name $root }}
        key: {{ .secretRef.key }}
    {{- end }}
  {{- end }}
  {{- if and $memory $memory.enabled }}
  memory:
    serverRef: {{ $memory.serverRef }}
  {{- end }}
  {{- if $agent.security }}
  security:
    {{- toYaml $agent.security | nindent 4 }}
  {{- end }}
  {{- if $agent.schedule }}
  schedule: {{ tpl $agent.schedule $root | quote }}
  {{- end }}
  {{- if $agent.schedulePrompt }}
  schedulePrompt: {{ tpl $agent.schedulePrompt $root | quote }}
  {{- end }}
  {{- if $agent.storage }}
  storage:
    size: {{ $agent.storage.size | quote }}
    {{- if $agent.storage.storageClass }}
    storageClass: {{ $agent.storage.storageClass | quote }}
    {{- end }}
  {{- end }}
  {{- if $agent.resources }}
  resources:
    {{- toYaml $agent.resources | nindent 4 }}
  {{- end }}
  {{- if $agent.concurrency }}
  concurrency:
    maxRuns: {{ $agent.concurrency.maxRuns }}
    policy: {{ $agent.concurrency.policy }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
