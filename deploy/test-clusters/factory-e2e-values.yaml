# Values for the k3d multi-cluster E2E scaffold.
#
# This E2E target runs one observer against the management cluster and one
# observer for each workload cluster. Workload observers receive kubeconfigs via
# KUBECONFIG_DATA secret env vars; the runtime writes those to a temp file and
# exports KUBECONFIG before it launches OCI tool servers.

scope:
  gitlab:
    group: samyn92-lab
    coordinationProject: samyn92-lab/agentops-e2e
    baseURL: https://gitlab.com
  clusters:
    - name: mgmt
      displayName: Management
      local: true
    - name: prod
      displayName: Production
      kubeconfigSecret: kubeconfig-agentops-prod
      kubeconfigKey: kubeconfig
      tools: [kubectl, flux, tempo]
    - name: staging
      displayName: Staging
      kubeconfigSecret: kubeconfig-agentops-staging
      kubeconfigKey: kubeconfig
      tools: [kubectl, flux, tempo]

runtime:
  image: ghcr.io/samyn92/agentops/runtime:dev
  imagePullPolicy: Never

provider:
  name: kimi
  type: openaicompat
  model: kimi/kimi-k2.5
  fallbackModel: kimi/kimi-k2.5
  apiKeySecret:
    name: llm-api-keys
    key: KIMI_API_KEY
  endpoint:
    baseURL: https://api.moonshot.ai/v1

tokens:
  planner:
    secretName: gitlab-bot-planner
    secretKey: token
  coder:
    secretName: gitlab-bot-coder
    secretKey: token

memory:
  enabled: true
  serverRef: agentops-memory

agents:
  pm:
    enabled: true
    temperature: 1
  engineer:
    enabled: true
    temperature: 1
  observer:
    enabled: true
    temperature: 1
    schedule: "*/15 * * * *"

channels:
  labelBridge:
    enabled: true
