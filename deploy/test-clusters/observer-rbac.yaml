apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agentops-e2e-observer-reader
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - pods/log
      - services
      - endpoints
      - configmaps
      - events
      - persistentvolumeclaims
      - nodes
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources:
      - jobs
      - cronjobs
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources:
      - ingresses
      - networkpolicies
    verbs: [get, list, watch]
  - apiGroups: [agents.agentops.io]
    resources:
      - agents
      - agentruns
      - integrations
      - channels
      - providers
    verbs: [get, list, watch]
  - apiGroups: [kustomize.toolkit.fluxcd.io]
    resources:
      - kustomizations
    verbs: [get, list, watch]
  - apiGroups: [helm.toolkit.fluxcd.io]
    resources:
      - helmreleases
    verbs: [get, list, watch]
  - apiGroups: [source.toolkit.fluxcd.io]
    resources:
      - gitrepositories
      - helmrepositories
      - helmcharts
      - ocirepositories
      - buckets
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agentops-e2e-observer-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agentops-e2e-observer-reader
subjects:
  - kind: ServiceAccount
    name: infra-observer-mgmt-agent
    namespace: agents
