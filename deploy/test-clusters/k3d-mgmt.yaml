apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: agentops-mgmt
servers: 1
agents: 0
image: rancher/k3s:v1.31.5-k3s1
ports:
  - port: 30173:30173
    nodeFilters: [server:0]
  - port: 30080:30080
    nodeFilters: [server:0]
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters: [server:0]
