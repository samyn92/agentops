apiVersion: agents.agentops.io/v1alpha1
kind: Integration
metadata:
  name: flux-repo
  namespace: agents
spec:
  kind: gitlab-project
  displayName: "Flux GitOps Repository"
  description: "Main Flux GitOps repository for the home cluster"
  credentials:
    name: gitlab-tokens
    key: GITLAB_TOKEN
  gitlab:
    baseURL: https://gitlab.com
    project: homecluster/flux
    defaultBranch: main
  triggers:
    - on: merge_request
      actions: [open, update]
      agentRef: mr-reviewer
      prompt: |
        Review merge request !{{.MR.IID}} in project {{.Project.PathWithNamespace}}.
        Title: {{.MR.Title}}
        Description: {{.MR.Description}}
      git:
        ref: "{{.MR.SourceBranch}}"
