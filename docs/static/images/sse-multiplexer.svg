<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Geist', 'Inter', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <linearGradient id="runtimeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="consoleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow-runtime" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ec4899" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-console" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#10b981" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#34d399"/>
    </marker>
    <marker id="arrow-pink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f9a8d4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" fill="url(#bgGrad)" rx="12"/>
  <rect width="800" height="380" fill="url(#grid)"/>

  <!-- ═══════════════════ CONNECTIONS ═══════════════════ -->
  <!-- Agent pods → BFF multiplexer -->
  <path d="M 230 95 L 370 145" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 230 175 L 370 175" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 230 255 L 370 210" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>

  <!-- BFF → Browsers -->
  <path d="M 560 145 L 630 100" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 560 175 L 630 175" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 560 210 L 630 250" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>

  <!-- Labels on connections -->
  <text x="290" y="120" fill="#34d399" font-size="9" font-weight="500" opacity="0.8">SSE</text>
  <text x="290" y="168" fill="#34d399" font-size="9" font-weight="500" opacity="0.8">SSE</text>
  <text x="290" y="238" fill="#34d399" font-size="9" font-weight="500" opacity="0.8">SSE</text>
  <text x="586" y="88" fill="#34d399" font-size="9" font-weight="500" opacity="0.8">SSE</text>
  <text x="586" y="168" fill="#34d399" font-size="9" font-weight="500" opacity="0.8">SSE</text>
  <text x="586" y="246" fill="#34d399" font-size="9" font-weight="500" opacity="0.8">SSE</text>

  <!-- ═══════════════════ AGENT PODS ═══════════════════ -->
  <text x="140" y="48" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600" letter-spacing="1">AGENT PODS</text>

  <rect x="60" y="65" rx="6" ry="6" width="170" height="50" fill="#1e293b" stroke="#ec4899" stroke-width="1"/>
  <text x="145" y="87" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="600">agent-1</text>
  <text x="145" y="104" text-anchor="middle" fill="#475569" font-size="9">:4096</text>

  <rect x="60" y="145" rx="6" ry="6" width="170" height="50" fill="#1e293b" stroke="#ec4899" stroke-width="1"/>
  <text x="145" y="167" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="600">agent-2</text>
  <text x="145" y="184" text-anchor="middle" fill="#475569" font-size="9">:4096</text>

  <rect x="60" y="225" rx="6" ry="6" width="170" height="50" fill="#1e293b" stroke="#ec4899" stroke-width="1"/>
  <text x="145" y="247" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="600">agent-3</text>
  <text x="145" y="264" text-anchor="middle" fill="#475569" font-size="9">:4096</text>

  <!-- ═══════════════════ BFF MULTIPLEXER ═══════════════════ -->
  <g filter="url(#glow-console)">
    <rect x="370" y="80" rx="8" ry="8" width="190" height="195" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <rect x="370" y="80" rx="8" ry="8" width="190" height="4" fill="url(#consoleGrad)"/>
  <text x="465" y="110" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="700">Console BFF</text>
  <text x="465" y="130" text-anchor="middle" fill="#64748b" font-size="10">SSE Multiplexer</text>

  <!-- Internal detail -->
  <rect x="390" y="145" rx="4" ry="4" width="150" height="40" fill="#111827" stroke="#334155" stroke-width="0.5"/>
  <text x="465" y="164" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="500">Fan-in: aggregate</text>
  <text x="465" y="178" text-anchor="middle" fill="#475569" font-size="9">agent SSE streams</text>

  <rect x="390" y="195" rx="4" ry="4" width="150" height="40" fill="#111827" stroke="#334155" stroke-width="0.5"/>
  <text x="465" y="214" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="500">Fan-out: broadcast</text>
  <text x="465" y="228" text-anchor="middle" fill="#475569" font-size="9">to browser clients</text>

  <text x="465" y="260" text-anchor="middle" fill="#475569" font-size="9">per-agent stream isolation</text>

  <!-- ═══════════════════ BROWSER CLIENTS ═══════════════════ -->
  <text x="700" y="48" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600" letter-spacing="1">BROWSERS</text>

  <rect x="630" y="70" rx="6" ry="6" width="130" height="50" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="695" y="92" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Client 1</text>
  <text x="695" y="109" text-anchor="middle" fill="#475569" font-size="9">Browser tab</text>

  <rect x="630" y="150" rx="6" ry="6" width="130" height="50" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="695" y="172" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Client 2</text>
  <text x="695" y="189" text-anchor="middle" fill="#475569" font-size="9">Browser tab</text>

  <rect x="630" y="230" rx="6" ry="6" width="130" height="50" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="695" y="252" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Client 3</text>
  <text x="695" y="269" text-anchor="middle" fill="#475569" font-size="9">Browser tab</text>

  <!-- Watermark -->
  <text x="400" y="368" text-anchor="middle" fill="#334155" font-size="11" letter-spacing="2" font-weight="500">SSE MULTIPLEXER FAN-IN / FAN-OUT</text>
</svg>
