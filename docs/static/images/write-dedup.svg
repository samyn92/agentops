<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="'Geist', 'Inter', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <linearGradient id="memoryGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow-memory" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#8b5cf6" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-violet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#34d399"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="520" fill="url(#bgGrad)" rx="12"/>
  <rect width="700" height="520" fill="url(#grid)"/>

  <!-- ═══════════════════ CONNECTIONS ═══════════════════ -->
  <!-- Incoming → has topic_key? -->
  <path d="M 350 75 L 350 115" stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arrow-gray)"/>
  <!-- topic_key YES → match? -->
  <path d="M 480 145 L 560 145" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrow-violet)"/>
  <text x="510" y="138" fill="#a78bfa" font-size="9" font-weight="500">yes</text>
  <!-- match YES → UPDATE -->
  <path d="M 560 170 L 560 220" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="572" y="200" fill="#34d399" font-size="9" font-weight="500">yes</text>
  <!-- match NO → hash -->
  <path d="M 560 170 L 560 310" stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="572" y="276" fill="#94a3b8" font-size="9" font-weight="500" opacity="0.5">no</text>
  <!-- topic_key NO → hash -->
  <path d="M 350 175 L 350 290" stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arrow-gray)"/>
  <text x="362" y="240" fill="#94a3b8" font-size="9" font-weight="500">no</text>
  <!-- hash → match 15min YES → bump -->
  <path d="M 480 330 L 560 330" stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arrow-amber)"/>
  <text x="510" y="322" fill="#fbbf24" font-size="9" font-weight="500">yes</text>
  <!-- hash → match 15min NO → INSERT -->
  <path d="M 350 360 L 350 420" stroke="#34d399" stroke-width="2.5" fill="none" marker-end="url(#arrow-green)"/>
  <text x="362" y="395" fill="#94a3b8" font-size="9" font-weight="500">no</text>

  <!-- ═══════════════════ INCOMING ═══════════════════ -->
  <g filter="url(#glow-memory)">
    <rect x="240" y="35" rx="6" ry="6" width="220" height="40" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <rect x="240" y="35" rx="6" ry="6" width="220" height="4" fill="url(#memoryGrad)"/>
  <text x="350" y="62" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">Incoming observation</text>

  <!-- ═══════════════════ DECISION: has topic_key? ═══════════════════ -->
  <rect x="260" y="120" rx="6" ry="6" width="220" height="50" fill="#111827" stroke="#a78bfa" stroke-width="1"/>
  <text x="370" y="145" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Has topic_key?</text>
  <text x="370" y="162" text-anchor="middle" fill="#475569" font-size="9">Semantic key for upsert</text>

  <!-- ═══════════════════ DECISION: match topic_key? ═══════════════════ -->
  <rect x="490" y="120" rx="6" ry="6" width="170" height="50" fill="#111827" stroke="#a78bfa" stroke-width="1"/>
  <text x="575" y="140" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Match (topic_key,</text>
  <text x="575" y="155" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">project, scope)?</text>

  <!-- ═══════════════════ RESULT: UPDATE ═══════════════════ -->
  <rect x="490" y="225" rx="6" ry="6" width="140" height="45" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="560" y="248" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="700">UPDATE</text>
  <text x="560" y="263" text-anchor="middle" fill="#475569" font-size="9">(upsert)</text>

  <!-- ═══════════════════ HASH STEP ═══════════════════ -->
  <rect x="220" y="295" rx="6" ry="6" width="260" height="60" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="350" y="318" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">SHA-256(normalize(content))</text>
  <text x="350" y="338" text-anchor="middle" fill="#475569" font-size="9">Match within 15-minute window?</text>

  <!-- ═══════════════════ RESULT: BUMP ═══════════════════ -->
  <rect x="490" y="305" rx="6" ry="6" width="170" height="45" fill="#1c1a05" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="575" y="325" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">Bump count</text>
  <text x="575" y="342" text-anchor="middle" fill="#475569" font-size="9">duplicate_count++</text>

  <!-- ═══════════════════ RESULT: INSERT ═══════════════════ -->
  <rect x="260" y="425" rx="6" ry="6" width="180" height="50" fill="#052e16" stroke="#10b981" stroke-width="1.5"/>
  <text x="350" y="450" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="700">INSERT</text>
  <text x="350" y="468" text-anchor="middle" fill="#475569" font-size="10">(new observation)</text>

  <!-- Watermark -->
  <text x="350" y="508" text-anchor="middle" fill="#334155" font-size="11" letter-spacing="2" font-weight="500">THREE-TIER WRITE DEDUP</text>
</svg>
