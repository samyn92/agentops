<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="'Geist', 'Inter', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <linearGradient id="operatorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="runtimeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="memoryGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="toolsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow-operator" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-runtime" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ec4899" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-memory" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#8b5cf6" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-tools" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#06b6d4" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="780" height="580" fill="url(#bgGrad)" rx="12"/>
  <rect width="780" height="580" fill="url(#grid)"/>

  <!-- ═══════════════════ CONNECTIONS ═══════════════════ -->
  <!-- Operator → Daemon -->
  <path d="M 290 130 L 200 220" stroke="#60a5fa" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <!-- Operator → Task -->
  <path d="M 490 130 L 580 220" stroke="#60a5fa" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <!-- Daemon → Runtime -->
  <path d="M 200 315 L 350 380" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow-gray)"/>
  <!-- Task → Runtime -->
  <path d="M 580 315 L 430 380" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow-gray)"/>
  <!-- Runtime → Memory -->
  <path d="M 310 470 L 200 500" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrow-violet)"/>
  <!-- Runtime → Tools -->
  <path d="M 470 470 L 580 500" stroke="#22d3ee" stroke-width="2" fill="none" marker-end="url(#arrow-cyan)"/>

  <!-- ═══════════════════ OPERATOR ═══════════════════ -->
  <g filter="url(#glow-operator)">
    <rect x="230" y="40" rx="8" ry="8" width="320" height="85" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <rect x="230" y="40" rx="8" ry="8" width="320" height="4" fill="url(#operatorGrad)"/>
  <text x="390" y="72" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="700">AgentOps Operator</text>
  <text x="390" y="92" text-anchor="middle" fill="#64748b" font-size="10">Watches: Agent, AgentRun, AgentTool, Channel, AgentResource</text>
  <text x="390" y="110" text-anchor="middle" fill="#475569" font-size="9">Reconciles Custom Resources into Kubernetes workloads</text>

  <!-- ═══════════════════ DAEMON AGENTS ═══════════════════ -->
  <rect x="70" y="225" rx="8" ry="8" width="240" height="85" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <rect x="70" y="225" rx="8" ry="8" width="240" height="4" fill="#10b981" opacity="0.6"/>
  <text x="190" y="255" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="700">Daemon Agents</text>
  <text x="190" y="273" text-anchor="middle" fill="#64748b" font-size="10">Deployment + Service + PVC</text>
  <text x="190" y="291" text-anchor="middle" fill="#475569" font-size="9">Always running  |  HTTP :4096</text>

  <!-- ═══════════════════ TASK AGENTS ═══════════════════ -->
  <rect x="470" y="225" rx="8" ry="8" width="240" height="85" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <rect x="470" y="225" rx="8" ry="8" width="240" height="4" fill="#10b981" opacity="0.6"/>
  <text x="590" y="255" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="700">Task Agents</text>
  <text x="590" y="273" text-anchor="middle" fill="#64748b" font-size="10">Job per AgentRun</text>
  <text x="590" y="291" text-anchor="middle" fill="#475569" font-size="9">One prompt, exits when done</text>

  <!-- ═══════════════════ FANTASY SDK RUNTIME ═══════════════════ -->
  <g filter="url(#glow-runtime)">
    <rect x="200" y="380" rx="8" ry="8" width="380" height="85" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
  </g>
  <rect x="200" y="380" rx="8" ry="8" width="380" height="4" fill="url(#runtimeGrad)"/>
  <text x="390" y="412" text-anchor="middle" fill="#f9a8d4" font-size="15" font-weight="700">Fantasy SDK Runtime (Go)</text>
  <!-- Sub-component pills -->
  <rect x="225" y="425" rx="4" ry="4" width="100" height="22" fill="#111827" stroke="#334155" stroke-width="0.5"/>
  <text x="275" y="440" text-anchor="middle" fill="#94a3b8" font-size="9">Working Memory</text>
  <rect x="335" y="425" rx="4" ry="4" width="55" height="22" fill="#111827" stroke="#334155" stroke-width="0.5"/>
  <text x="362" y="440" text-anchor="middle" fill="#94a3b8" font-size="9">OTEL</text>
  <rect x="400" y="425" rx="4" ry="4" width="85" height="22" fill="#111827" stroke="#334155" stroke-width="0.5"/>
  <text x="442" y="440" text-anchor="middle" fill="#94a3b8" font-size="9">MCP Client</text>
  <rect x="495" y="425" rx="4" ry="4" width="60" height="22" fill="#111827" stroke="#334155" stroke-width="0.5"/>
  <text x="525" y="440" text-anchor="middle" fill="#94a3b8" font-size="9">FEP</text>

  <!-- ═══════════════════ MEMORY ═══════════════════ -->
  <g filter="url(#glow-memory)">
    <rect x="60" y="500" rx="8" ry="8" width="250" height="45" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <rect x="60" y="500" rx="8" ry="8" width="250" height="4" fill="url(#memoryGrad)"/>
  <text x="185" y="530" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">agentops-memory</text>
  <text x="295" y="530" fill="#475569" font-size="9">(SQLite + FTS5)</text>

  <!-- ═══════════════════ TOOLS ═══════════════════ -->
  <g filter="url(#glow-tools)">
    <rect x="470" y="500" rx="8" ry="8" width="250" height="45" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  </g>
  <rect x="470" y="500" rx="8" ry="8" width="250" height="4" fill="url(#toolsGrad)"/>
  <text x="595" y="530" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">MCP Tools</text>
  <text x="700" y="530" fill="#475569" font-size="9">(OCI / stdio)</text>

  <!-- Watermark -->
  <text x="390" y="572" text-anchor="middle" fill="#334155" font-size="11" letter-spacing="2" font-weight="500">AGENTOPS CONCEPTS OVERVIEW</text>
</svg>
