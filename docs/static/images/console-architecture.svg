<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" font-family="'Geist', 'Inter', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <linearGradient id="consoleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="bffGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="runtimeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="memoryGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="tempoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="k8sGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow-console" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#10b981" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-bff" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#10b981" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-runtime" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ec4899" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-memory" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#8b5cf6" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-tempo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-k8s" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#34d399"/>
    </marker>
    <marker id="arrow-pink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f9a8d4"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="700" fill="url(#bgGrad)" rx="12"/>
  <rect width="960" height="700" fill="url(#grid)"/>

  <!-- ═══════════════════ CONNECTIONS (behind cards) ═══════════════════ -->

  <!-- Browser → BFF (SSE + REST) -->
  <path d="M 480 195 L 480 260" stroke="#34d399" stroke-width="2.5" fill="none" marker-end="url(#arrow-green)"/>
  <text x="494" y="232" fill="#34d399" font-size="10" font-weight="500" opacity="0.8">SSE + REST</text>

  <!-- BFF → Agent Pods -->
  <path d="M 200 410 L 200 505" stroke="#f9a8d4" stroke-width="2.5" fill="none" marker-end="url(#arrow-pink)"/>
  <text x="136" y="462" fill="#f9a8d4" font-size="10" font-weight="500" opacity="0.8">FEP / SSE</text>

  <!-- BFF → Memory -->
  <path d="M 410 410 L 480 505" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-dasharray="6,3" opacity="0.7" marker-end="url(#arrow-violet)"/>
  <text x="425" y="452" fill="#a78bfa" font-size="10" font-weight="500" opacity="0.7">Proxy</text>

  <!-- BFF → Tempo -->
  <path d="M 560 410 L 660 505" stroke="#fbbf24" stroke-width="1.5" fill="none" stroke-dasharray="6,3" opacity="0.7" marker-end="url(#arrow-amber)"/>
  <text x="598" y="452" fill="#fbbf24" font-size="10" font-weight="500" opacity="0.7">Query</text>

  <!-- BFF → K8s API -->
  <path d="M 680 370 L 820 505" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-dasharray="6,3" opacity="0.7" marker-end="url(#arrow-blue)"/>
  <text x="740" y="430" fill="#60a5fa" font-size="10" font-weight="500" opacity="0.7">Watch</text>

  <!-- ═══════════════════ BROWSER LAYER ═══════════════════ -->
  <rect x="100" y="40" rx="8" ry="8" width="760" height="155" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="8,4" opacity="0.4"/>
  <text x="120" y="62" fill="#64748b" font-size="10" font-weight="600" letter-spacing="1">BROWSER</text>

  <g filter="url(#glow-console)">
    <rect x="120" y="75" rx="8" ry="8" width="720" height="115" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <rect x="120" y="75" rx="8" ry="8" width="720" height="4" fill="url(#consoleGrad)"/>
  <text x="480" y="104" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="700">SolidJS Progressive Web App</text>

  <!-- Three panels inside browser -->
  <rect x="145" y="118" rx="4" ry="4" width="150" height="55" fill="#111827" stroke="#334155" stroke-width="0.75"/>
  <text x="220" y="140" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Sidebar</text>
  <text x="220" y="156" text-anchor="middle" fill="#475569" font-size="9">Agent list + status</text>

  <rect x="310" y="118" rx="4" ry="4" width="300" height="55" fill="#111827" stroke="#334155" stroke-width="0.75"/>
  <text x="460" y="140" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Center Stage</text>
  <text x="460" y="156" text-anchor="middle" fill="#475569" font-size="9">Chat  |  Inspector  |  Run detail  |  Trace view</text>

  <rect x="625" y="118" rx="4" ry="4" width="190" height="55" fill="#111827" stroke="#334155" stroke-width="0.75"/>
  <text x="720" y="140" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Right Panel</text>
  <text x="720" y="156" text-anchor="middle" fill="#475569" font-size="9">Runs + Memory</text>

  <!-- ═══════════════════ BFF LAYER ═══════════════════ -->
  <g filter="url(#glow-bff)">
    <rect x="100" y="270" rx="8" ry="8" width="760" height="140" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <rect x="100" y="270" rx="8" ry="8" width="760" height="4" fill="url(#bffGrad)"/>
  <text x="480" y="302" text-anchor="middle" fill="#6ee7b7" font-size="15" font-weight="700">Go BFF (:8080)</text>
  <text x="480" y="320" text-anchor="middle" fill="#64748b" font-size="11">chi v5 router  |  controller-runtime informers</text>

  <!-- BFF sub-modules -->
  <rect x="125" y="338" rx="4" ry="4" width="145" height="48" fill="#111827" stroke="#34d399" stroke-width="0.75"/>
  <text x="197" y="358" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">SSE Multiplexer</text>
  <text x="197" y="374" text-anchor="middle" fill="#475569" font-size="9">FEP fan-out</text>

  <rect x="285" y="338" rx="4" ry="4" width="145" height="48" fill="#111827" stroke="#a78bfa" stroke-width="0.75"/>
  <text x="357" y="358" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Memory Proxy</text>
  <text x="357" y="374" text-anchor="middle" fill="#475569" font-size="9">REST pass-through</text>

  <rect x="445" y="338" rx="4" ry="4" width="120" height="48" fill="#111827" stroke="#fbbf24" stroke-width="0.75"/>
  <text x="505" y="358" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">Tempo Proxy</text>
  <text x="505" y="374" text-anchor="middle" fill="#475569" font-size="9">Trace queries</text>

  <rect x="580" y="338" rx="4" ry="4" width="255" height="48" fill="#111827" stroke="#60a5fa" stroke-width="0.75"/>
  <text x="707" y="358" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">K8s Resource Browser</text>
  <text x="707" y="374" text-anchor="middle" fill="#475569" font-size="9">12 types  |  Watch + List</text>

  <!-- ═══════════════════ BACKEND SERVICES ═══════════════════ -->
  <rect x="50" y="470" rx="8" ry="8" width="860" height="165" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="8,4" opacity="0.4"/>
  <text x="70" y="492" fill="#64748b" font-size="10" font-weight="600" letter-spacing="1">BACKEND SERVICES</text>

  <!-- Agent Pods -->
  <g filter="url(#glow-runtime)">
    <rect x="70" y="505" rx="8" ry="8" width="200" height="105" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
  </g>
  <rect x="70" y="505" rx="8" ry="8" width="200" height="4" fill="url(#runtimeGrad)"/>
  <text x="170" y="537" text-anchor="middle" fill="#f9a8d4" font-size="14" font-weight="700">Agent Pods</text>
  <text x="170" y="555" text-anchor="middle" fill="#64748b" font-size="10">Fantasy Runtime :4096</text>
  <text x="170" y="573" text-anchor="middle" fill="#475569" font-size="9">/prompt/stream  |  /steer</text>
  <text x="170" y="589" text-anchor="middle" fill="#475569" font-size="9">/abort  |  /permission</text>

  <!-- Memory -->
  <g filter="url(#glow-memory)">
    <rect x="310" y="505" rx="8" ry="8" width="200" height="105" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <rect x="310" y="505" rx="8" ry="8" width="200" height="4" fill="url(#memoryGrad)"/>
  <text x="410" y="537" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="700">agentops-memory</text>
  <text x="410" y="555" text-anchor="middle" fill="#64748b" font-size="10">SQLite + FTS5 :7437</text>
  <text x="410" y="573" text-anchor="middle" fill="#475569" font-size="9">Context injection</text>
  <text x="410" y="589" text-anchor="middle" fill="#475569" font-size="9">Session summaries</text>

  <!-- Tempo -->
  <g filter="url(#glow-tempo)">
    <rect x="550" y="505" rx="8" ry="8" width="170" height="105" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <rect x="550" y="505" rx="8" ry="8" width="170" height="4" fill="url(#tempoGrad)"/>
  <text x="635" y="537" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="700">Tempo</text>
  <text x="635" y="555" text-anchor="middle" fill="#64748b" font-size="10">Distributed Tracing</text>
  <text x="635" y="573" text-anchor="middle" fill="#475569" font-size="9">HTTP :3200</text>
  <text x="635" y="589" text-anchor="middle" fill="#475569" font-size="9">OTLP :4317</text>

  <!-- K8s API -->
  <g filter="url(#glow-k8s)">
    <rect x="760" y="505" rx="8" ry="8" width="130" height="105" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <rect x="760" y="505" rx="8" ry="8" width="130" height="4" fill="url(#k8sGrad)"/>
  <text x="825" y="537" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">K8s API</text>
  <text x="825" y="555" text-anchor="middle" fill="#64748b" font-size="10">Cluster resources</text>
  <text x="825" y="573" text-anchor="middle" fill="#475569" font-size="9">Agent CRs</text>
  <text x="825" y="589" text-anchor="middle" fill="#475569" font-size="9">Watch + List</text>

  <!-- Watermark -->
  <text x="480" y="688" text-anchor="middle" fill="#334155" font-size="11" letter-spacing="2" font-weight="500">AGENTOPS CONSOLE ARCHITECTURE</text>
</svg>
