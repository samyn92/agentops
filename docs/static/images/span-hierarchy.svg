<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 340" font-family="'Geist', 'Inter', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#f59e0b" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="620" height="340" fill="url(#bgGrad)" rx="12"/>
  <rect width="620" height="340" fill="url(#grid)"/>

  <!-- Root span -->
  <g filter="url(#glow-amber)">
    <rect x="40" y="40" rx="6" ry="6" width="540" height="260" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <rect x="40" y="40" rx="6" ry="6" width="540" height="4" fill="url(#amberGrad)"/>
  <text x="60" y="68" fill="#fcd34d" font-size="14" font-weight="700">invoke_agent</text>
  <text x="218" y="68" fill="#64748b" font-size="11">(root span)</text>

  <!-- Child: gen_ai span -->
  <rect x="70" y="85" rx="5" ry="5" width="490" height="85" fill="#111827" stroke="#f59e0b" stroke-width="0.75"/>
  <text x="90" y="107" fill="#fbbf24" font-size="12" font-weight="600">gen_ai.stream / gen_ai.generate</text>
  <text x="395" y="107" fill="#64748b" font-size="10">(per LLM call)</text>

  <!-- Events inside gen_ai -->
  <rect x="95" y="120" rx="3" ry="3" width="120" height="20" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="155" y="134" text-anchor="middle" fill="#94a3b8" font-size="9">tool.call events</text>

  <rect x="225" y="120" rx="3" ry="3" width="200" height="20" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="325" y="134" text-anchor="middle" fill="#94a3b8" font-size="9">content events (prompt, completion, tool I/O)</text>

  <text x="90" y="158" fill="#475569" font-size="9">Recorded as span events on the gen_ai span</text>

  <!-- Child: memory.inject -->
  <rect x="70" y="180" rx="5" ry="5" width="210" height="32" fill="#111827" stroke="#8b5cf6" stroke-width="0.75"/>
  <text x="90" y="201" fill="#c4b5fd" font-size="12" font-weight="600">memory.inject</text>
  <text x="222" y="201" fill="#64748b" font-size="10">(context injection)</text>

  <!-- Child: memory.save -->
  <rect x="70" y="220" rx="5" ry="5" width="220" height="32" fill="#111827" stroke="#8b5cf6" stroke-width="0.75"/>
  <text x="90" y="241" fill="#c4b5fd" font-size="12" font-weight="600">memory.save</text>
  <text x="210" y="241" fill="#64748b" font-size="10">(observation writes)</text>

  <!-- Child: pre_flight_budget -->
  <rect x="70" y="260" rx="5" ry="5" width="230" height="32" fill="#111827" stroke="#475569" stroke-width="0.75"/>
  <text x="90" y="281" fill="#94a3b8" font-size="12" font-weight="600">pre_flight_budget</text>
  <text x="246" y="281" fill="#64748b" font-size="10">(token estimation)</text>

  <!-- Tree lines -->
  <line x1="60" y1="85" x2="60" y2="276" stroke="#475569" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="127" x2="70" y2="127" stroke="#475569" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="196" x2="70" y2="196" stroke="#475569" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="236" x2="70" y2="236" stroke="#475569" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="276" x2="70" y2="276" stroke="#475569" stroke-width="1" opacity="0.4"/>

  <!-- Watermark -->
  <text x="310" y="328" text-anchor="middle" fill="#334155" font-size="11" letter-spacing="2" font-weight="500">OTEL SPAN HIERARCHY</text>
</svg>
