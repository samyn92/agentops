<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620" font-family="'Geist', 'Inter', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <linearGradient id="runtimeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="memoryGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow-runtime" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ec4899" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-memory" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#8b5cf6" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-violet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-pink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f9a8d4"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="620" fill="url(#bgGrad)" rx="12"/>
  <rect width="720" height="620" fill="url(#grid)"/>

  <!-- ═══════════════════ CONNECTIONS ═══════════════════ -->
  <!-- User prompt → Runtime -->
  <path d="M 180 80 L 180 120" stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arrow-gray)"/>
  <!-- Runtime → Memory (GET) -->
  <path d="M 280 170 L 440 170" stroke="#a78bfa" stroke-width="2.5" fill="none" marker-end="url(#arrow-violet)"/>
  <!-- Memory → Runtime (response) -->
  <path d="M 440 210 L 280 210" stroke="#a78bfa" stroke-width="2.5" fill="none" stroke-dasharray="4,3" opacity="0.5" marker-end="url(#arrow-violet)"/>
  <!-- Runtime → Format -->
  <path d="M 180 240 L 180 300" stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arrow-gray)"/>
  <!-- Format → OTEL -->
  <path d="M 180 405 L 180 450" stroke="#f9a8d4" stroke-width="2" fill="none" marker-end="url(#arrow-pink)"/>

  <!-- ═══════════════════ USER PROMPT ═══════════════════ -->
  <rect x="80" y="40" rx="6" ry="6" width="200" height="40" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="180" y="65" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">User sends prompt</text>

  <!-- ═══════════════════ RUNTIME CARD ═══════════════════ -->
  <g filter="url(#glow-runtime)">
    <rect x="60" y="125" rx="8" ry="8" width="220" height="110" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
  </g>
  <rect x="60" y="125" rx="8" ry="8" width="220" height="4" fill="url(#runtimeGrad)"/>
  <text x="170" y="155" text-anchor="middle" fill="#f9a8d4" font-size="14" font-weight="700">Agent Runtime</text>
  <text x="170" y="175" text-anchor="middle" fill="#64748b" font-size="10">Calls memory service</text>
  <!-- Request detail -->
  <rect x="78" y="188" rx="3" ry="3" width="186" height="20" fill="#111827" stroke="#334155" stroke-width="0.5"/>
  <text x="171" y="202" text-anchor="middle" fill="#f9a8d4" font-size="8">GET /context?project=&amp;query=&amp;limit=</text>
  <text x="170" y="225" text-anchor="middle" fill="#475569" font-size="9">Query = user prompt text</text>

  <!-- ═══════════════════ MEMORY SERVICE ═══════════════════ -->
  <g filter="url(#glow-memory)">
    <rect x="440" y="110" rx="8" ry="8" width="240" height="160" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <rect x="440" y="110" rx="8" ry="8" width="240" height="4" fill="url(#memoryGrad)"/>
  <text x="560" y="140" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="700">agentops-memory</text>
  <text x="560" y="158" text-anchor="middle" fill="#64748b" font-size="10">SQLite + FTS5 BM25</text>

  <!-- Returns -->
  <text x="560" y="180" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="500">Returns:</text>

  <rect x="460" y="190" rx="3" ry="3" width="200" height="22" fill="#111827" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="560" y="205" text-anchor="middle" fill="#c4b5fd" font-size="9">recent_sessions (by recency)</text>

  <rect x="460" y="218" rx="3" ry="3" width="200" height="22" fill="#111827" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="560" y="233" text-anchor="middle" fill="#c4b5fd" font-size="9">recent_observations (BM25 ranked)</text>

  <text x="560" y="258" text-anchor="middle" fill="#475569" font-size="9">Recency fallback if query empty</text>

  <!-- ═══════════════════ FORMAT STEP ═══════════════════ -->
  <rect x="60" y="305" rx="8" ry="8" width="560" height="95" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="340" y="330" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Runtime formats as XML and prepends to system context</text>

  <rect x="80" y="345" rx="3" ry="3" width="240" height="20" fill="#111827" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="200" y="359" text-anchor="middle" fill="#c4b5fd" font-size="9">&lt;memory:sessions&gt;...&lt;/memory:sessions&gt;</text>

  <rect x="335" y="345" rx="3" ry="3" width="240" height="20" fill="#111827" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="455" y="359" text-anchor="middle" fill="#c4b5fd" font-size="9">&lt;memory:context&gt;...&lt;/memory:context&gt;</text>

  <text x="340" y="388" text-anchor="middle" fill="#475569" font-size="9">Injected before conversation history in the context window</text>

  <!-- ═══════════════════ OTEL SPAN ═══════════════════ -->
  <rect x="60" y="455" rx="8" ry="8" width="560" height="110" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="340" y="480" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">OTEL span event per injected observation</text>

  <rect x="80" y="495" rx="4" ry="4" width="520" height="50" fill="#111827" stroke="#475569" stroke-width="0.5"/>
  <text x="100" y="514" fill="#fbbf24" font-size="10" font-weight="600">memory.context_item</text>
  <text x="100" y="532" fill="#94a3b8" font-size="9">rank: 1  |  method: "fts5_bm25" | "recency" | "backfill"  |  observation_id: 42</text>

  <!-- Watermark -->
  <text x="360" y="608" text-anchor="middle" fill="#334155" font-size="11" letter-spacing="2" font-weight="500">MEMORY CONTEXT INJECTION FLOW</text>
</svg>
