<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="'Geist', 'Inter', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <linearGradient id="consoleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow-console" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#10b981" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="420" fill="url(#bgGrad)" rx="12"/>
  <rect width="780" height="420" fill="url(#grid)"/>

  <!-- Outer chrome -->
  <g filter="url(#glow-console)">
    <rect x="40" y="40" rx="8" ry="8" width="700" height="330" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  </g>
  <rect x="40" y="40" rx="8" ry="8" width="700" height="4" fill="url(#consoleGrad)"/>
  <text x="390" y="68" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="700">AgentOps Console — Three-Panel Layout</text>

  <!-- Left Sidebar -->
  <rect x="60" y="85" rx="4" ry="4" width="140" height="265" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="130" y="107" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Sidebar</text>
  <line x1="75" y1="115" x2="185" y2="115" stroke="#1e293b" stroke-width="1"/>
  <!-- Agent list items -->
  <rect x="72" y="125" rx="3" ry="3" width="116" height="24" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <circle cx="85" cy="137" r="4" fill="#10b981"/>
  <text x="98" y="141" fill="#94a3b8" font-size="9">coder-agent</text>
  <rect x="72" y="155" rx="3" ry="3" width="116" height="24" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <circle cx="85" cy="167" r="4" fill="#10b981"/>
  <text x="98" y="171" fill="#94a3b8" font-size="9">devops-agent</text>
  <rect x="72" y="185" rx="3" ry="3" width="116" height="24" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <circle cx="85" cy="197" r="4" fill="#f59e0b"/>
  <text x="98" y="201" fill="#94a3b8" font-size="9">reviewer-agent</text>
  <rect x="72" y="215" rx="3" ry="3" width="116" height="24" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <circle cx="85" cy="227" r="4" fill="#475569"/>
  <text x="98" y="231" fill="#64748b" font-size="9">idle-agent</text>
  <text x="130" y="268" text-anchor="middle" fill="#475569" font-size="9">Agent list</text>
  <text x="130" y="282" text-anchor="middle" fill="#475569" font-size="9">with status badges</text>
  <text x="130" y="296" text-anchor="middle" fill="#475569" font-size="9">daemon / task</text>
  <text x="130" y="310" text-anchor="middle" fill="#475569" font-size="9">online indicators</text>

  <!-- Center Stage -->
  <rect x="215" y="85" rx="4" ry="4" width="335" height="200" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="382" y="107" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Center Stage</text>
  <line x1="230" y1="115" x2="535" y2="115" stroke="#1e293b" stroke-width="1"/>
  <!-- Mode pills -->
  <rect x="260" y="123" rx="3" ry="3" width="45" height="18" fill="#064e3b" stroke="#10b981" stroke-width="0.5"/>
  <text x="282" y="136" text-anchor="middle" fill="#6ee7b7" font-size="8" font-weight="600">Chat</text>
  <rect x="311" y="123" rx="3" ry="3" width="60" height="18" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="341" y="136" text-anchor="middle" fill="#64748b" font-size="8">Inspector</text>
  <rect x="377" y="123" rx="3" ry="3" width="40" height="18" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="397" y="136" text-anchor="middle" fill="#64748b" font-size="8">Run</text>
  <rect x="423" y="123" rx="3" ry="3" width="45" height="18" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="445" y="136" text-anchor="middle" fill="#64748b" font-size="8">Trace</text>
  <!-- Chat messages -->
  <rect x="232" y="150" rx="4" ry="4" width="200" height="22" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="245" y="165" fill="#94a3b8" font-size="8">Message bubbles + tool cards</text>
  <rect x="232" y="178" rx="4" ry="4" width="160" height="22" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="245" y="193" fill="#94a3b8" font-size="8">Permission gates + Q&amp;A</text>
  <rect x="232" y="206" rx="4" ry="4" width="180" height="22" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="245" y="221" fill="#94a3b8" font-size="8">Delegation status cards</text>
  <text x="382" y="258" text-anchor="middle" fill="#475569" font-size="9">Real-time FEP event rendering</text>

  <!-- Composer -->
  <rect x="215" y="295" rx="4" ry="4" width="335" height="55" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="382" y="317" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Composer</text>
  <!-- Resource chips -->
  <rect x="233" y="326" rx="3" ry="3" width="60" height="14" fill="#164e63" stroke="#0e7490" stroke-width="0.5"/>
  <text x="263" y="336" text-anchor="middle" fill="#67e8f9" font-size="7">gh:my-repo</text>
  <rect x="299" y="326" rx="3" ry="3" width="50" height="14" fill="#164e63" stroke="#0e7490" stroke-width="0.5"/>
  <text x="324" y="336" text-anchor="middle" fill="#67e8f9" font-size="7">gl:project</text>
  <rect x="370" y="326" rx="3" ry="3" width="100" height="14" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
  <text x="420" y="336" text-anchor="middle" fill="#475569" font-size="7">prompt input area</text>
  <rect x="480" y="326" rx="3" ry="3" width="55" height="14" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
  <text x="507" y="336" text-anchor="middle" fill="#475569" font-size="7">ctx: 67%</text>

  <!-- Right Panel -->
  <rect x="565" y="85" rx="4" ry="4" width="155" height="265" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="642" y="107" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">Right Panel</text>
  <line x1="578" y1="115" x2="707" y2="115" stroke="#1e293b" stroke-width="1"/>
  <!-- Runs section -->
  <text x="642" y="133" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Runs</text>
  <rect x="578" y="140" rx="3" ry="3" width="135" height="18" fill="#1e293b" stroke="#10b981" stroke-width="0.5"/>
  <text x="588" y="153" fill="#6ee7b7" font-size="8">Succeeded — 2m ago</text>
  <rect x="578" y="162" rx="3" ry="3" width="135" height="18" fill="#1e293b" stroke="#ec4899" stroke-width="0.5"/>
  <text x="588" y="175" fill="#f9a8d4" font-size="8">Running — in progress</text>
  <rect x="578" y="184" rx="3" ry="3" width="135" height="18" fill="#1e293b" stroke="#ef4444" stroke-width="0.5"/>
  <text x="588" y="197" fill="#fca5a5" font-size="8">Failed — 15m ago</text>
  <!-- Divider -->
  <line x1="578" y1="218" x2="707" y2="218" stroke="#1e293b" stroke-width="1"/>
  <!-- Memory section -->
  <text x="642" y="236" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Memory</text>
  <rect x="578" y="244" rx="3" ry="3" width="135" height="18" fill="#1e293b" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="588" y="257" fill="#c4b5fd" font-size="8">Browse observations</text>
  <rect x="578" y="266" rx="3" ry="3" width="135" height="18" fill="#1e293b" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="588" y="279" fill="#c4b5fd" font-size="8">Search / create / edit</text>
  <rect x="578" y="288" rx="3" ry="3" width="135" height="18" fill="#1e293b" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="588" y="301" fill="#c4b5fd" font-size="8">Session summaries</text>

  <!-- Watermark -->
  <text x="390" y="408" text-anchor="middle" fill="#334155" font-size="11" letter-spacing="2" font-weight="500">CONSOLE THREE-PANEL LAYOUT</text>
</svg>
