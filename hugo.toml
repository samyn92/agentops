baseURL = "https://samyn92.github.io/agentops/"
title = "AgentOps"
canonifyURLs = false
relativeURLs = false

# Language settings
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageName = "English"
    contentDir = "content/en"
    weight = 1

# Hugo modules - Docsy theme
[module]
  proxy = "direct"
  [module.hugoVersion]
    extended = true
    min = "0.110.0"
  [[module.imports]]
    path = "github.com/google/docsy"
    disable = false
  [[module.imports]]
    path = "github.com/google/docsy/dependencies"
    disable = false

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.parser.attribute]
      block = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "tango"

# Taxonomy
[taxonomies]
  tag = "tags"
  category = "categories"

# Site params
[params]
  description = "Kubernetes-native AI agent platform with memory, delegation, and observability"
  github_repo = "https://github.com/samyn92/agentops"
  github_project_repo = "https://github.com/samyn92/agentops"

  # Docsy params
  offlineSearch = true
  prism_syntax_highlighting = false

  # UI customization
  [params.ui]
    sidebar_menu_compact = true
    sidebar_menu_foldable = true
    sidebar_search_disable = false
    navbar_logo = true
    footer_about_enable = true
    breadcrumb_disable = false

  [params.ui.readingtime]
    enable = true

  # Links
  [[params.links.developer]]
    name = "GitHub"
    url = "https://github.com/samyn92"
    icon = "fab fa-github"
    desc = "Source code"
  [[params.links.developer]]
    name = "agentops-core"
    url = "https://github.com/samyn92/agentops-core"
    icon = "fas fa-cogs"
    desc = "Kubernetes Operator"
  [[params.links.developer]]
    name = "agentops-runtime"
    url = "https://github.com/samyn92/agentops-runtime"
    icon = "fas fa-robot"
    desc = "Fantasy Agent Runtime"

[menus]
  [[menus.main]]
    name = "GitHub"
    weight = 30
    url = "https://github.com/samyn92"
    pre = "<i class='fab fa-github'></i>"
